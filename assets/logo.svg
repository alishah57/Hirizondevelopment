<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-labelledby="title desc">
  <title id="title">Horizon Development Logo</title>
  <desc id="desc">Horizon Development wordmark with a gold horizon line and monogram.</desc>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B7A28"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E2C47E"/>
    </linearGradient>
  </defs>
  <rect width="420" height="120" fill="none"/>
  <g transform="translate(12,14)">
    <rect x="0" y="0" width="92" height="92" rx="8" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <path d="M15 74V18h10v23h40V18h10v56H65V50H25v24Z" fill="url(#gold)"/>
  </g>
  <g fill="#F5F2ED" font-family="Montserrat, Arial, sans-serif" letter-spacing="3">
    <text x="120" y="50" font-size="28" font-weight="600">HORIZON</text>
    <text x="120" y="78" font-size="15" font-weight="500" opacity="0.85">DEVELOPMENT</text>
  </g>
  <line x1="120" y1="90" x2="405" y2="90" stroke="url(#gold)" stroke-width="2"/>
</svg>
